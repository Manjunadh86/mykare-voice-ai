version: "3.9"

services:
  backend:
    build: ./backend
    container_name: mykare-backend
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/mykare.db
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - mykare-db:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: mykare-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/voice
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mykare-db:
